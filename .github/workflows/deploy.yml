name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
```

---

**4. Ative o GitHub Pages**
- No repositório → **Settings → Pages**
- Em **Source** selecione **GitHub Actions**
- Salve

---

**5. Apontar seu domínio**

No repositório → **Settings → Pages → Custom domain** coloque:
```
caldeirapaizanteadvocacia.cscode.me
```

E no seu DNS (onde o domínio está configurado), troque o apontamento da Vercel para:
```
CNAME  caldeirapaizanteadvocacia  YOUR_USER.github.io
